   <!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Eve's Balance</title>
    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>

    <!-- Falling leaves layer — fixed overlay, sits behind everything -->
    <div id="leaf-container"></div>

    <header class="header">
      <div class="header-left"></div>

      <div class="logo-container">
        <a href="home.html">
          <img src="images/LogoNB.png" alt="Logo" class="logo">
        </a>
      </div>

      <div class="header-right">
      <button class="cart-btn" onclick="openCart()">
  <!-- SVG shopping bag icon -->
     <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
     <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
     <line x1="3" y1="6" x2="21" y2="6"/>
     <path d="M16 10a4 4 0 01-8 0"/>
     </svg>
      <!-- Badge — shows item count, hidden when 0 -->
       <span id="cart-badge"></span>
     </button>
 
      </div>
    </header>

    <nav>
      <a href="home.html">Home</a> |
      <a href="schedule.html">Schedule</a> |
      <a href="products.html">Products</a> |
      <a href="about.html">About</a>
    </nav>

    <hr>

    <section class="checkout-hero">
      <h2>Checkout</h2>
      <p>Review your order below then proceed to secure payment via Square.</p>
    </section>
 
    <section class="checkout-section">
 
      <!-- Order Summary -->
      <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="checkout-items">
          <!-- Rendered by checkout.js -->
        </div>
        <div class="order-total-row">
          <span>Total</span>
          <span id="checkout-total">$0.00</span>
        </div>
      </div>
 
      <!-- Empty cart state -->
      <div id="empty-cart-msg" style="display:none; text-align:center; padding: 40px;">
        <p>Your cart is empty.</p>
        <a href="products.html" class="back-to-shop-btn">Back to Shop</a>
      </div>
 
      <!-- Pay Now button — hidden until items confirmed -->
      <div class="pay-now-wrap" id="pay-now-wrap">
        <p class="secure-note">🔒 Secure checkout powered by Square</p>
        <button class="pay-now-btn" onclick="redirectToSquare()">
          Pay Now
        </button>
        <a href="products.html" class="continue-shopping">← Continue Shopping</a>
      </div>
 
    </section>
    <!-- Dark overlay behind slideout -->
    <div id="cart-overlay" onclick="closeCart()"></div>
 
    <!-- Slideout panel -->
    <div id="cart-slideout">
      <div class="cart-header">
       <h3>Your Cart</h3>
      <button class="cart-close-btn" onclick="closeCart()">✕</button>
    </div>
 
      <!-- Cart items render here dynamically via shared.js -->
      <div id="cart-items"></div>
 
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
      </div>
    </div>

    <script src="shared.js"></script>
    <script src="checkout.js"></script>
  </body>
</html>
